<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A1A">
<title>Neway Security</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --gold:#C9A84C;--dark:#1A1A1A;--dark2:#2A2A2A;--dark3:#383838;
    --light:#F5F5F5;--lighter:#FAFAFA;--white:#FFFFFF;
    --text:#1A1A1A;--text2:#555;--text3:#888;
    --border:#E0E0E0;--border2:#CACACA;
    --danger:#C0392B;--success:#1A7A4A;
    --radius:10px;--radius-sm:6px;
    --shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--light);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;font-size:15px;outline:none}

  .screen{display:none;min-height:100vh}
  .screen.active{display:flex;flex-direction:column}

  /* PIN */
  #pin-screen{background:var(--dark);align-items:center;justify-content:center}
  .pin-logo{text-align:center;margin-bottom:36px}
  .pin-logo img{width:90px;height:90px;object-fit:contain;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
  .pin-logo-placeholder{width:90px;height:90px;border-radius:50%;background:var(--dark2);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:11px;color:var(--gold);letter-spacing:1px;text-align:center;line-height:1.3}
  .pin-logo-name{color:#fff;font-size:22px;font-weight:700;letter-spacing:0.5px}
  .pin-logo-sub{color:#777;font-size:11px;margin-top:3px;letter-spacing:1px}
  .pin-label{color:#aaa;font-size:13px;text-align:center;margin-bottom:18px;letter-spacing:1px}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #555;background:transparent;transition:all 0.15s}
  .pin-dot.filled{background:var(--gold);border-color:var(--gold)}
  .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;justify-content:center}
  .pin-btn{width:72px;height:72px;border-radius:50%;background:var(--dark2);color:#fff;
    font-size:22px;font-weight:400;border:0.5px solid #444;transition:all 0.1s;
    display:flex;align-items:center;justify-content:center;flex-direction:column}
  .pin-btn:active{background:var(--gold);border-color:var(--gold);transform:scale(0.94)}
  .pin-btn .sub{font-size:8px;color:#888;letter-spacing:1px;margin-top:1px}
  .pin-btn.del{font-size:18px}
  .pin-error{color:var(--danger);font-size:13px;text-align:center;margin-top:-16px;margin-bottom:10px;min-height:20px}

  /* APP SHELL */
  #app-screen{background:var(--light)}
  .top-bar{background:var(--dark);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .top-bar-left{display:flex;align-items:center;gap:10px}
  .top-bar-logo-img{width:36px;height:36px;object-fit:contain;border-radius:4px}
  .top-bar-logo-placeholder{width:36px;height:36px;background:var(--dark3);border:1px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--gold);text-align:center;line-height:1.2;letter-spacing:0.3px}
  .top-bar-text .top-bar-logo{color:var(--gold);font-size:14px;font-weight:700;letter-spacing:0.5px}
  .top-bar-text .top-bar-sub{color:#777;font-size:10px}
  .top-bar-actions{display:flex;gap:8px}
  .icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--dark2);
    color:#aaa;font-size:16px;display:flex;align-items:center;justify-content:center;border:0.5px solid #444}
  .icon-btn:active{background:var(--dark3)}

  /* TAB BAR */
  .tab-bar{background:var(--white);border-top:0.5px solid var(--border);
    display:grid;grid-template-columns:repeat(3,1fr);position:sticky;bottom:0;z-index:100}
  .tab-item{padding:10px 8px 8px;display:flex;flex-direction:column;align-items:center;
    gap:3px;color:var(--text3);font-size:10px;font-weight:500;letter-spacing:0.3px;transition:color 0.15s}
  .tab-item.active{color:var(--gold)}
  .tab-item svg{width:22px;height:22px;stroke-width:1.6}

  /* PAGES */
  .page{display:none;flex:1;overflow-y:auto;padding:16px}
  .page.active{display:block}

  /* HOME */
  .home-greeting{margin-bottom:20px}
  .home-greeting h2{font-size:20px;font-weight:600}
  .home-greeting p{color:var(--text2);font-size:13px;margin-top:3px}
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .action-card{background:var(--white);border-radius:var(--radius);padding:18px 14px;
    border:0.5px solid var(--border);box-shadow:var(--shadow);text-align:center;cursor:pointer;transition:all 0.15s}
  .action-card:active{transform:scale(0.97)}
  .action-card.gold{background:var(--dark);border-color:var(--dark)}
  .action-card svg{width:28px;height:28px;margin-bottom:8px;stroke-width:1.5}
  .action-card.gold svg{stroke:var(--gold)}
  .action-card:not(.gold) svg{stroke:var(--text2)}
  .action-card .ac-label{font-size:13px;font-weight:600;color:var(--text)}
  .action-card.gold .ac-label{color:var(--white)}
  .action-card .ac-sub{font-size:11px;color:var(--text3);margin-top:2px}
  .action-card.gold .ac-sub{color:#888}
  .section-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px}
  .recent-list{display:flex;flex-direction:column;gap:8px}
  .recent-item{background:var(--white);border-radius:var(--radius);padding:12px 14px;
    border:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .recent-item:active{background:var(--lighter)}
  .ri-left{flex:1;min-width:0}
  .ri-num{font-size:13px;font-weight:600;color:var(--gold)}
  .ri-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ri-date{font-size:11px;color:var(--text3);margin-top:1px}
  .ri-right{text-align:right;flex-shrink:0;margin-left:12px}
  .ri-amount{font-size:15px;font-weight:600}
  .ri-type{font-size:10px;font-weight:600;letter-spacing:0.5px;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block}
  .badge-inv{background:#FFF3E0;color:#E65100}
  .badge-quo{background:#E8F5E9;color:#1B5E20}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
  .empty-state svg{width:40px;height:40px;stroke:var(--border2);margin-bottom:12px}

  /* NEW DOC */
  .form-section{background:var(--white);border-radius:var(--radius);padding:14px;border:0.5px solid var(--border);margin-bottom:14px}
  .form-section-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--lighter);color:var(--text);transition:border-color 0.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:var(--white)}
  .field textarea{resize:vertical;min-height:70px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* LINE ITEMS */
  .line-items{display:flex;flex-direction:column;gap:8px}
  .line-item{background:var(--lighter);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border);position:relative}
  .li-top{display:flex;align-items:flex-start;gap:8px}
  .li-desc{flex:1;min-width:0}
  .li-desc-text{font-size:14px;font-weight:500;color:var(--text);word-break:break-word}
  .li-desc-cat{font-size:11px;color:var(--text3);margin-top:1px}
  .li-delete{width:28px;height:28px;border-radius:var(--radius-sm);background:transparent;color:var(--text3);font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .li-delete:active{background:#FFEBEE;color:var(--danger)}
  .li-bottom{display:flex;align-items:center;gap:8px;margin-top:8px}
  .li-qty-wrap{display:flex;align-items:center;gap:6px}
  .li-qty-btn{width:26px;height:26px;border-radius:4px;background:var(--white);border:1px solid var(--border);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
  .li-qty-btn:active{background:var(--gold);color:white;border-color:var(--gold)}
  .li-qty{width:36px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px 0;font-size:14px;font-weight:600;background:var(--white)}
  .li-price-wrap{flex:1;display:flex;align-items:center;gap:4px;justify-content:flex-end}
  .li-price-label{font-size:12px;color:var(--text3)}
  .li-price{width:100px;text-align:right;border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:14px;font-weight:600;background:var(--white)}
  .li-price:focus{border-color:var(--gold)}
  .li-total-line{font-size:12px;color:var(--text3);text-align:right;margin-top:4px}
  .li-total-line span{font-weight:600;color:var(--text);font-size:13px}
  .add-item-btn{width:100%;padding:11px;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
  .add-item-btn:active{background:var(--lighter)}
  .add-item-btn svg{width:18px;height:18px;stroke:var(--text3);stroke-width:2}

  /* TOTALS */
  .totals-box{background:var(--dark);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
  .totals-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
  .totals-row.sub{color:#aaa;font-size:13px}
  .totals-row.total{border-top:1px solid #444;margin-top:8px;padding-top:10px}
  .totals-row.total .tl{color:var(--gold);font-weight:700;font-size:16px}
  .totals-row.total .tr{color:var(--white);font-weight:700;font-size:18px}
  .tl{color:#ccc;font-size:14px}
  .tr{color:var(--white);font-size:14px;font-weight:500}

  /* GEN BUTTON */
  .gen-btn{width:100%;padding:15px;background:var(--gold);color:var(--dark);font-size:15px;font-weight:700;border-radius:var(--radius);letter-spacing:0.3px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
  .gen-btn:active{opacity:0.85;transform:scale(0.98)}
  .gen-btn svg{width:20px;height:20px;stroke:var(--dark);stroke-width:2}

  /* DRAWER */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none}
  .drawer-overlay.open{display:block}
  .drawer{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:20px 20px 0 0;z-index:201;max-height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s ease}
  .drawer.open{transform:translateY(0)}
  .drawer-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 4px}
  .drawer-title{padding:8px 16px 12px;font-size:16px;font-weight:600;border-bottom:0.5px solid var(--border)}
  .drawer-search{padding:10px 16px;border-bottom:0.5px solid var(--border)}
  .drawer-search input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--lighter);font-size:14px}
  .drawer-search input:focus{border-color:var(--gold)}
  .catalog-list{overflow-y:auto;flex:1;padding:8px 0}
  .cat-group{padding:6px 0}
  .cat-group-title{padding:6px 16px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;background:var(--lighter);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
  .cat-item{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s}
  .cat-item:active{background:var(--lighter)}
  .cat-item-name{font-size:14px;font-weight:500}
  .cat-item-price{font-size:13px;color:var(--gold);font-weight:600}
  .cat-item-unit{font-size:11px;color:var(--text3)}
  .cat-item-range{font-size:10px;color:var(--text3);margin-top:1px}

  /* HISTORY */
  .doc-card{background:var(--white);border-radius:var(--radius);padding:14px;border:0.5px solid var(--border);margin-bottom:12px}
  .doc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .doc-num{font-size:18px;font-weight:700;color:var(--dark)}
  .doc-date{font-size:12px;color:var(--text3);margin-top:3px}
  .doc-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
  .doc-client{font-size:15px;font-weight:600;margin-bottom:4px}
  .doc-subject{font-size:13px;color:var(--text2);margin-bottom:12px}
  .doc-items-preview{border-top:0.5px solid var(--border);padding-top:10px}
  .dip-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text2)}
  .dip-row span:last-child{font-weight:500;color:var(--text)}
  .doc-total-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:8px;padding-top:8px}
  .doc-total-label{font-size:13px;color:var(--text2)}
  .doc-total-val{font-size:18px;font-weight:700}
  .doc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .doc-action-btn{flex:1;min-width:0;padding:10px 6px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px;border:1px solid var(--border)}
  .doc-action-btn.primary{background:var(--dark);color:var(--gold);border-color:var(--dark)}
  .doc-action-btn.share{background:#1D6FA4;color:#fff;border-color:#1D6FA4}
  .doc-action-btn.secondary{background:var(--white);color:var(--text)}
  .doc-action-btn svg{width:14px;height:14px;stroke-width:2;flex-shrink:0}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--white);border-radius:16px;width:100%;max-width:360px;overflow:hidden}
  .modal-head{padding:16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:16px;font-weight:600}
  .modal-body{padding:16px}
  .modal-foot{padding:12px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
  .modal-btn{flex:1;min-width:80px;padding:11px;border-radius:var(--radius-sm);font-size:14px;font-weight:600}
  .modal-btn.primary{background:var(--gold);color:var(--dark)}
  .modal-btn.share{background:#1D6FA4;color:#fff}
  .modal-btn.secondary{background:var(--lighter);color:var(--text);border:1px solid var(--border)}
  .modal-btn:active{opacity:0.85}

  /* PRINT AREA */
  #print-area{display:none}

  /* TOAST */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:var(--white);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:500;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* PRINT STYLES */
  @media print{
    body>*{display:none!important}
    #print-area{display:block!important;font-family:Arial,Helvetica,sans-serif;color:#000;font-size:11pt;margin:0;padding:0}
    .pa-header{background:#1A1A1A;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start}
    .pa-logo-wrap{display:flex;align-items:center;gap:14px}
    .pa-logo-img{width:64px;height:64px;object-fit:contain}
    .pa-logo-placeholder{width:64px;height:64px;border:1.5px solid #C9A84C;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:7pt;color:#C9A84C;text-align:center;line-height:1.3;letter-spacing:0.5px}
    .pa-co-name{font-size:16pt;font-weight:700;color:#C9A84C;margin-bottom:3px}
    .pa-co-sub{font-size:8pt;color:#aaa;letter-spacing:1px}
    .pa-co-contact{font-size:8pt;color:#bbb;margin-top:6px;line-height:1.7}
    .pa-doc-type{text-align:right}
    .pa-doc-title{font-size:20pt;font-weight:700;color:#C9A84C;letter-spacing:2px}
    .pa-doc-num{font-size:10pt;color:#ddd;margin-top:4px}
    .pa-doc-date{font-size:8pt;color:#999;margin-top:2px}
    .pa-body{padding:18px 24px}
    .pa-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
    .pa-meta-box{padding:10px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa}
    .pa-meta-label{font-size:7pt;color:#888;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px}
    .pa-meta-val{font-size:10pt;font-weight:600}
    table.pa-items{width:100%;border-collapse:collapse;margin-bottom:18px}
    table.pa-items th{background:#1A1A1A;color:#C9A84C;font-size:8pt;padding:7px 9px;text-align:left;font-weight:700;letter-spacing:0.5px}
    table.pa-items th:last-child,table.pa-items td:last-child{text-align:right}
    table.pa-items td{padding:7px 9px;font-size:9.5pt;border-bottom:1px solid #eee}
    table.pa-items tr:nth-child(even) td{background:#f9f9f9}
    .pa-totals{margin-left:auto;width:230px;margin-bottom:18px}
    .pa-totals-row{display:flex;justify-content:space-between;padding:3px 0;font-size:9.5pt}
    .pa-totals-row.grand{border-top:2px solid #1A1A1A;margin-top:6px;padding-top:7px;font-weight:700;font-size:12pt}
    .pa-totals-row.grand span:last-child{color:#C9A84C}
    .pa-bank{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:14px}
    .pa-bank-title{font-size:8pt;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:#555;margin-bottom:7px}
    .pa-bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px}
    .pa-bank-row{display:flex;gap:6px;font-size:9pt;padding:2px 0}
    .pa-bank-key{color:#888;min-width:90px}
    .pa-bank-val{font-weight:600}
    .pa-terms{background:#fffbf0;border:1px solid #e8d88a;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:8.5pt;color:#555;line-height:1.6}
    .pa-terms-title{font-weight:700;color:#333;margin-bottom:4px;font-size:9pt}
    .pa-footnote{border-top:1px solid #ddd;padding-top:10px;font-size:8.5pt;color:#666;line-height:1.6;font-style:italic}
    .pa-footer{background:#1A1A1A;color:#777;padding:10px 24px;font-size:7.5pt;display:flex;justify-content:space-between;margin-top:14px}
    .pa-footer span{color:#C9A84C}
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen" class="screen active">

let currentDoc = null;

// ── LOGO ─────────────────────────────────────────────
function handleLogoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoDataURL = e.target.result;
    localStorage.setItem('neway_logo', logoDataURL);
    applyLogo(logoDataURL);
    showToast('Logo updated');
  };
  reader.readAsDataURL(file);
}
function applyLogo(url) {
  // Pin screen
  const pinWrap = document.getElementById('pin-logo-img-wrap');
  if (pinWrap) pinWrap.innerHTML = `<img src="${url}" style="width:90px;height:90px;object-fit:contain;display:block;margin:0 auto 12px;border-radius:8px">`;
  // Top bar
  const tbWrap = document.getElementById('topbar-logo-wrap');
  if (tbWrap) tbWrap.innerHTML = `<img src="${url}" class="top-bar-logo-img">`;
}

// ── PIN ──────────────────────────────────────────────
let pinBuffer = '';
function pinPress(d) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 6) {
    setTimeout(() => {
      if (pinBuffer === CORRECT_PIN) {
        document.getElementById('pin-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        renderHome();
      } else {
        document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
        pinBuffer = '';
        updatePinDots();
        setTimeout(() => document.getElementById('pin-error').textContent = '', 2000);
      }
    }, 120);
  }
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots() {
  for (let i=0;i<6;i++) document.getElementById('d'+i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
}
function lockApp() {
  pinBuffer=''; updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('pin-screen').classList.add('active');
}

// ── NAV ──────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='home') renderHome();
  if (name==='new') renderNewDoc();
  if (name==='history') renderHistory();
}

function today() {
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}
function greet() { const h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }

function renderLineItems() {
  if (!currentDoc||currentDoc.items.length===0) return '<div style="text-align:center;color:var(--text3);font-size:13px;padding:12px 0">No items yet — tap below to add</div>';
  return currentDoc.items.map((item,i)=>`
    <div class="line-item" id="li-${i}">
      <div class="li-top">
        <div class="li-desc">
          <div class="li-desc-text">${item.name}</div>
          <div class="li-desc-cat">${item.cat}${item.rangeNote?' · '+item.rangeNote:''}</div>
        </div>
        <button class="li-delete" onclick="removeItem(${i})">×</button>
      </div>
      <div class="li-bottom">
        <div class="li-qty-wrap">
          <button class="li-qty-btn" onclick="changeQty(${i},-1)">−</button>
          <input class="li-qty" type="number" min="1" value="${item.qty}" onchange="setQty(${i},this.value)">
          <button class="li-qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div class="li-price-wrap">
          <span class="li-price-label">R</span>
          <input class="li-price" type="number" value="${item.price}" onchange="setPrice(${i},this.value)" oninput="setPrice(${i},this.value)">
        </div>
      </div>
      <div class="li-total-line">Line total: <span>${fmt(item.qty*item.price)}</span></div>
    </div>`).join('');
}

function refreshLineItems() {
  const c=document.getElementById('line-items-container');
  if(c){c.innerHTML=renderLineItems();updateTotals();}
}
function removeItem(i){currentDoc.items.splice(i,1);refreshLineItems();}
function changeQty(i,d){currentDoc.items[i].qty=Math.max(1,currentDoc.items[i].qty+d);refreshLineItems();}
function setQty(i,v){currentDoc.items[i].qty=Math.max(1,parseInt(v)||1);refreshLineItems();}
function setPrice(i,v){currentDoc.items[i].price=parseFloat(v)||0;updateTotals();refreshLineTotals();}
function refreshLineTotals(){
  currentDoc.items.forEach((item,i)=>{
    const el=document.querySelector(`#li-${i} .li-total-line span`);
    if(el)el.textContent=fmt(item.qty*item.price);
  });
}
function getTotal(){if(!currentDoc)return 0;return currentDoc.items.reduce((s,it)=>s+it.qty*it.price,0);}
function updateTotals(){
  const t=getTotal();
  const sub=document.getElementById('tot-sub');
  const tot=document.getElementById('tot-total');
  if(sub)sub.textContent=fmt(t);
  if(tot)tot.textContent=fmt(t);
  if(currentDoc)currentDoc.total=t;
}

// ── CATALOG DRAWER ────────────────────────────────────
function openDrawer(){
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('catalog-drawer').classList.add('open');
  document.getElementById('catalog-search').value='';
  filterCatalog('');
  setTimeout(()=>document.getElementById('catalog-search').focus(),350);
}
function closeDrawer(){
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('catalog-drawer').classList.remove('open');
}
function filterCatalog(q){
  const s=q.toLowerCase();
  let html='';
  CATALOG.forEach(group=>{
    const items=s?group.items.filter(it=>it.name.toLowerCase().includes(s)||group.cat.toLowerCase().includes(s)):group.items;
    if(items.length===0)return;
    html+=`<div class="cat-group"><div class="cat-group-title">${group.cat}</div>`;
    items.forEach(item=>{
      html+=`<div class="cat-item" onclick="addItem(${JSON.stringify(item.name)},${JSON.stringify(group.cat)},${item.price},${JSON.stringify(item.unit||'')},${JSON.stringify(item.rangeNote||'')})">
        <div>
          <div class="cat-item-name">${item.name}</div>
          <div class="cat-item-unit">${item.unit}</div>
          ${item.rangeNote?`<div class="cat-item-range">Range: ${item.rangeNote}</div>`:''}
        </div>
        <div class="cat-item-price">${item.display||fmt(item.price)}</div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('catalog-list').innerHTML=html||'<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">No results</div>';
}
function addItem(name,cat,price,unit,rangeNote){
  currentDoc.items.push({name,cat,price,qty:1,unit,rangeNote});
  closeDrawer();
  setTimeout(()=>refreshLineItems(),300);
}

// ── GENERATE ──────────────────────────────────────────
function generateDoc(){
  if(!currentDoc.client.trim()){showToast('Please enter a client name');return;}
  if(currentDoc.items.length===0){showToast('Add at least one line item');return;}
  currentDoc.total=getTotal();
  const id=Date.now().toString();
  currentDoc.id=id;
  docs.push({...currentDoc});
  localStorage.setItem('neway_docs',JSON.stringify(docs));
  if(currentDoc.type==='invoice'){nextInv++;localStorage.setItem('nextInv',nextInv);}
  else{nextQuo++;localStorage.setItem('nextQuo',nextQuo);}
  buildPrintArea(currentDoc);
  document.getElementById('preview-summary').innerHTML=`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:22px;font-weight:700;color:var(--dark)">${currentDoc.number}</div>
      <div style="font-size:14px;color:var(--text2);margin-top:4px">${currentDoc.client}</div>
      <div style="font-size:24px;font-weight:700;margin-top:12px;color:var(--gold)">${fmt(currentDoc.total)}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${currentDoc.items.length} line item${currentDoc.items.length>1?'s':''} · ${currentDoc.date}</div>
      ${currentDoc.clientEmail?`<div style="font-size:12px;color:var(--text3);margin-top:2px">📧 ${currentDoc.clientEmail}</div>`:''}
    </div>`;
  document.getElementById('preview-modal').classList.add('open');
}
function closePreview(){document.getElementById('preview-modal').classList.remove('open');}
function printDoc(){
  closePreview();
  setTimeout(()=>window.print(),200);
  const savedDoc=currentDoc;
  currentDoc=null;
  setTimeout(()=>renderNewDoc(),600);
}

// ── SHARE VIA EMAIL ───────────────────────────────────
function shareDoc(docId){
  let d;
  if(docId){d=docs.find(x=>x.id===docId);}else{d=currentDoc;}
  if(!d)return;
  buildPrintArea(d);
  const to=d.clientEmail||'';
  const subject=encodeURIComponent(`${d.type==='invoice'?'Invoice':'Quotation'} ${d.number} – Neway Security`);
  const body=encodeURIComponent(
    `Dear ${d.client||'Client'},\n\nPlease find attached your ${d.type==='invoice'?'invoice':'quotation'} from Neway Security.\n\n`+
    `Document No: ${d.number}\nDate: ${d.date}\n${d.subject?'Subject: '+d.subject+'\n':''}`+
    `\nItems:\n`+d.items.map(it=>`  • ${it.qty}× ${it.name} — ${fmt(it.qty*it.price)}`).join('\n')+
    `\n\nTOTAL: ${fmt(d.total)}\n`+
    `\nBanking Details:\nBank: ${COMPANY.bank}\nAccount No: ${COMPANY.accNo}\nAccount Holder: ${COMPANY.accHolder}\nBranch Code: ${COMPANY.branch}\n\n`+
    `All prices exclude VAT. Valid for 30 days.\n\nKind regards,\n${COMPANY.name}\n${COMPANY.tel}\n${COMPANY.email}`
  );
  const mailto=`mailto:${to}?subject=${subject}&body=${body}`;
  window.location.href=mailto;
  closePreview();
  showToast('Opening email client...');
}

// ── HISTORY ───────────────────────────────────────────
function renderHistory(){
  const sorted=[...docs].reverse();
  document.getElementById('page-history').innerHTML=`
    <div style="font-size:18px;font-weight:600;margin-bottom:16px">All documents <span style="color:var(--text3);font-size:14px;font-weight:400">(${docs.length})</span></div>
    ${sorted.length===0?'<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="40" height="40"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><p>No documents yet</p></div>':
    sorted.map(d=>`
      <div class="doc-card">
        <div class="doc-header">
          <div><div class="doc-num">${d.number}</div><div class="doc-date">${d.date}</div></div>
          <div class="doc-badge ${d.type==='invoice'?'badge-inv':'badge-quo'}">${d.type==='invoice'?'INVOICE':'QUOTATION'}</div>
        </div>
        <div class="doc-client">${d.client||'—'}</div>
        ${d.subject?`<div class="doc-subject">${d.subject}</div>`:''}
        <div class="doc-items-preview">
          ${d.items.slice(0,3).map(it=>`<div class="dip-row"><span>${it.qty}× ${it.name}</span><span>${fmt(it.qty*it.price)}</span></div>`).join('')}
          ${d.items.length>3?`<div class="dip-row" style="color:var(--text3)"><span>+${d.items.length-3} more</span></div>`:''}
        </div>
        <div class="doc-total-row">
          <span class="doc-total-label">Total</span>
          <span class="doc-total-val">${fmt(d.total)}</span>
        </div>
        <div class="doc-actions">
          <button class="doc-action-btn secondary" onclick="deleteDoc('${d.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
            Delete
          </button>
          <button class="doc-action-btn share" onclick="shareDoc('${d.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Share
          </button>
          <button class="doc-action-btn primary" onclick="reprintDoc('${d.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print
          </button>
        </div>
      </div>`).join('')}`;
}

function viewDoc(id){
  const d=docs.find(x=>x.id===id);
  if(!d)return;
  buildPrintArea(d);
  document.getElementById('preview-summary').innerHTML=`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:22px;font-weight:700">${d.number}</div>
      <div style="font-size:14px;color:var(--text2);margin-top:4px">${d.client}</div>
      <div style="font-size:24px;font-weight:700;margin-top:12px;color:var(--gold)">${fmt(d.total)}</div>
      ${d.clientEmail?`<div style="font-size:12px;color:var(--text3);margin-top:4px">📧 ${d.clientEmail}</div>`:''}
    </div>`;
  // store ref for share/print
  window._viewingDocId = id;
  document.getElementById('preview-modal').classList.add('open');
  // update share btn in modal
  document.querySelector('.modal-btn.share').onclick = ()=>shareDoc(id);
  document.querySelector('.modal-btn.primary').onclick = ()=>reprintDoc(id);
}

function reprintDoc(id){
  const d=docs.find(x=>x.id===id);
  if(!d)return;
  buildPrintArea(d);
  closePreview();
  setTimeout(()=>window.print(),100);
}
function deleteDoc(id){
  if(!confirm('Delete this document?'))return;
  docs=docs.filter(x=>x.id!==id);
  localStorage.setItem('neway_docs',JSON.stringify(docs));
  renderHistory();
  showToast('Document deleted');
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
